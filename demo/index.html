        }

            padding: 6px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .demo-card .arrow {
            margin-top: 40px;
            font-size: 28px;
            animation: bounce 1.5s infinite;
